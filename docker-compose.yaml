
services:
  catalogue:
    build: ./catalogue
    image: pavankumarsri/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: pavankumarsri/user:1.0.0
    container_name: user
    ports:
    - "8080:8080"
    depends_on:
    - redis
  cart:
    build: ./cart
    image: joindevops/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
  shipping:
    build: ./shipping
    image: pavankumarsri/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql 
  frontend:
    build: ./frontend
    image: pavankumarsri/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user 
    - cart
    - shipping     
  mongodb:
    build: ./mongodb
    image: pavankumarsri/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: pavankumarsri/mysql:1.0.0
    container_name: mysql
  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq  
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
