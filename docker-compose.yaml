version: "3.8"

services:

  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: pavankumarsri/mongodb:1.0.0
    container_name: mongodb

  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: pavankumarsri/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

networks:
  default:
    name: roboshop