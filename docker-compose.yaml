services:
  catalogue:
    build: ./catalogue
    image: pavankumarsri/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: pavankumarsri/user:1.0.0
    container_name: user
    depends_on:
    - redis
  cart:
    build: ./cart
    image: pavankumarsri/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue   
  frontend:
    build: ./frontend
    image: pavankumarsri/user:1.0.0
    container_name: user
    depends_on:
    - user
    - catalogue
    - cart
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: pavankumarsri/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb
    volumes:
    - /:/data/db
  redis:
    image: redis:7.0
    container_name: redis  

networks:
  default:
    name: roboshop