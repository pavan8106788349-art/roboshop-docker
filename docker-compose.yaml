services:

  mongodb:
    build:
      context: ./mongodb
    image: mongodb:1.0.0
    container_name: mongodb
    networks:
      - roboshop

  catalogue:
    build:
      context: ./catalogue
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
    networks:
      - roboshop

  redis:
    image: redis:7
    container_name: redis
    networks:
      - roboshop

  user:
    build:
      context: ./user
    image: user:1.0.0
    container_name: user
    depends_on:
      - mongodb
      - redis
    networks:
      - roboshop

  cart:
    build:
      context: ./cart
    image: cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue
    networks:
      - roboshop

  frontend:
    build:
      context: ./frontend
    image: frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
    networks:
      - roboshop

networks:
  roboshop:
    driver: bridge