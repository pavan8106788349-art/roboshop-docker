
services:

  frontend:
    image: pavankumarsri/frontend:1.0.0
    ports:
      - "80:80"

  cart:
    image: pavankumarsri/cart-service:1.0.0

  user:
    image: pavankumarsri/user:1.0.0

  catalogue:
    image: pavankumarsri/catalogue:1.0.0
    environment:
    MONGO_URL: mongodb://mongo:27017/catalogue

  payment:
    image: pavankumarsri/payment:1.0.0

  shipping:
    build: ./shipping
    image: pavankumarsri/shipping:1.0.0

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1
      MYSQL_DATABASE: roboshop
    ports:
      - "3306:3306"

  redis:
    image: redis:7

  mongo:
    image: mongo:6

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"