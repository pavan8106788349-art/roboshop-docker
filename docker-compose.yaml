version: "3.9"

services:

  mongodb:
    image: mongo:6
    container_name: mongodb
    volumes:
      - mongodb:/data/db
    networks:
      - roboshop
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    networks:
      - roboshop
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1
      MYSQL_DATABASE: roboshop
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - roboshop
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    networks:
      - roboshop
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  catalogue:
    build: ./catalogue
    image: pavankumarsri/catalogue:1.0.0
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - roboshop

  user:
    build: ./user
    image: pavankumarsri/user:1.0.0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - roboshop

  cart:
    build: ./cart
    image: pavankumarsri/cart:1.0.0
    depends_on:
      redis:
        condition: service_healthy
      catalogue:
        condition: service_started
    networks:
      - roboshop

  shipping:
    build: ./shipping
    image: pavankumarsri/shipping:1.0.0
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roboshop

  payment:
    build: ./payment
    image: pavankumarsri/payment:1.0.0
    depends_on:
      rabbitmq:
        condition: service_healthy
      cart:
        condition: service_started
      user:
        condition: service_started
    networks:
      - roboshop

  frontend:
    build: ./frontend
    image: pavankumarsri/frontend:1.0.0
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment
    networks:
      - roboshop

networks:
  roboshop:
    driver: bridge

volumes:
  mongodb:
  mysql:
