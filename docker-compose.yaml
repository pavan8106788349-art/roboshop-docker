services:
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: joindevops/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis

  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: joindevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/catalogue

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: joindevops/user:1.0.0
    container_name: user
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - MONGO_URL=mongodb://mongodb:27017/user

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: joindevops/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user

networks:
  default:
    driver: bridge
    name: roboshop
    external: false