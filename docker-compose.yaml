version: "3.8"

services:

  frontend:
    image: pavankumarsri/frontend:1.0.0
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

  cart:
    image: pavankumarsri/cart-service:1.0.0

  user:
    image: pavankumarsri/user:1.0.0

  catalogue:
    image: pavankumarsri/catalogue:1.0.0
    ports:
      - "8080:8080"
    environment:
      MONGO_URL: mongodb://mongo:27017

  payment:
    image: pavankumarsri/payment:1.0.0

  shipping:
    image: pavankumarsri/shipping:1.0.0
    build: ./shipping

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1
      MYSQL_DATABASE: roboshop
    ports:
      - "3306:3306"

  redis:
    image: redis:7

  mongo:
    image: mongo:6

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf