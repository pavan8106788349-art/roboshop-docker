services:

  mongodb:
    build:
      context: ./mongodb
    image: mongodb:1.0.0
    container_name: mongodb
    networks:
      - roboshop

  redis:
    image: redis:7
    container_name: redis
    networks:
      - roboshop

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1
      MYSQL_DATABASE: roboshop
    networks:
      - roboshop

  catalogue:
    build:
      context: ./catalogue
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
    networks:
      - roboshop

  user:
    build:
      context: ./user
    image: user:1.0.0
    container_name: user
    depends_on:
      - mongodb
      - redis
    networks:
      - roboshop

  cart:
    build:
      context: ./cart
    image: cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue
    networks:
      - roboshop

  shipping:
    build:
      context: ./shipping
    image: shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: RoboShop@1
      DB_NAME: roboshop
    networks:
      - roboshop

  frontend:
    build:
      context: ./frontend
    image: frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
    networks:
      - roboshop

networks:
  roboshop:
    driver: bridge
