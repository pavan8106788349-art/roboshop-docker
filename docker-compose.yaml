version: '3.9'

services:
  catalogue:
    build: ./catalogue
    image: pavankumarsri/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  mongodb:
    build: ./mongodb
    image: pavankumarsri/mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: false